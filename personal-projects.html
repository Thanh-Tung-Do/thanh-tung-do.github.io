<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Personal &amp; Data Projects — Ryan Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:       #ffffff;
      --color-surface:  #f4f6f9;
      --color-border:   #e2e6ec;
      --color-text:     #1a1f2e;
      --color-muted:    #6b7280;
      --color-accent:   #4a6fa5;
      --color-accent-h: #3a5f95;
      --color-accent-lt:#eef2f9;
      --font:           'Inter', sans-serif;
      --radius:         8px;
      --shadow-sm:      0 1px 3px rgba(0,0,0,.08);
      --shadow-md:      0 4px 16px rgba(0,0,0,.10);
      --transition:     0.25s ease;
      --max-w:          900px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--color-bg); color: var(--color-text); line-height: 1.7; font-size: 16px; }
    a { color: var(--color-accent); text-decoration: none; }
    a:hover { color: var(--color-accent-h); }
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }

    /* ─── Nav ─── */
    nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--color-border); }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-logo { font-size: 1.05rem; font-weight: 700; color: var(--color-text); }
    .nav-back { font-size: 0.875rem; font-weight: 500; color: var(--color-muted); display: flex; align-items: center; gap: 6px; transition: color var(--transition); }
    .nav-back:hover { color: var(--color-accent); }

    /* ─── Page header ─── */
    .page-header { padding: 64px 0 48px; border-bottom: 1px solid var(--color-border); }
    .page-header .label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-accent); margin-bottom: 12px; }
    .page-header h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 12px; }
    .page-header p { font-size: 1.05rem; color: var(--color-muted); max-width: 560px; }

    /* ─── Project list ─── */
    .projects-body { padding: 48px 0 80px; }

    .project-list { display: flex; flex-direction: column; gap: 16px; }

    .project-item {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      transition: box-shadow var(--transition), transform var(--transition);
    }

    .project-item:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .project-item-body { display: flex; flex-direction: column; gap: 8px; }

    .project-item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .type-badge {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-accent);
      background: var(--color-accent-lt);
      padding: 2px 10px;
      border-radius: 100px;
    }

    .project-item h3 { font-size: 1.05rem; font-weight: 700; color: var(--color-text); line-height: 1.3; }
    .project-item p { font-size: 0.9rem; color: var(--color-muted); line-height: 1.6; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag { font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 100px; background: var(--color-surface); color: var(--color-accent); border: 1px solid var(--color-border); letter-spacing: 0.02em; }

    .project-item-action { display: flex; align-items: flex-start; padding-top: 4px; }

    .view-link {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--color-accent);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: gap var(--transition);
    }

    .view-link:hover { gap: 8px; }

    /* Empty state */
    .empty-state {
      border: 1.5px dashed var(--color-border);
      border-radius: var(--radius);
      padding: 48px 28px;
      text-align: center;
      background: var(--color-surface);
    }

    .empty-state p { color: var(--color-muted); font-size: 0.95rem; }

    /* ─── Footer ─── */
    footer { background: var(--color-text); color: rgba(255,255,255,0.45); text-align: center; padding: 28px 24px; font-size: 0.8rem; }
    footer a { color: rgba(255,255,255,0.65); }
    footer a:hover { color: #fff; }

    @media (max-width: 600px) {
      .project-item { grid-template-columns: 1fr; }
    }
  </style>
</head>
